name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore release.jks -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=OnePlus15, OU=simg2img, O=simg2img, L=Unknown, ST=Unknown, C=ID"
          keytool -list -v -keystore release.jks -storepass android123 -alias release \
            | grep -i "SHA256:" | head -1 | awk '{print $NF}' > release.fingerprint
          echo "Fingerprint:"
          cat release.fingerprint

      - name: Build release APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          apksigner sign --ks release.jks --ks-pass pass:android123 \
            --ks-key-alias release --key-pass pass:android123 \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Align APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          zipalign -v -p 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/OnePlus15.apk

      - name: Verify APK signature
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          apksigner verify --verbose app/build/outputs/apk/release/OnePlus15.apk

      - name: Rename fingerprint for release body
        run: |
          echo "## OnePlus 15 LSPosed Module" > release_body.md
          echo "" >> release_body.md
          echo "### SHA-256 Fingerprint:" >> release_body.md
          echo '```' >> release_body.md
          cat release.fingerprint >> release_body.md
          echo '```' >> release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: OnePlus 15 ${{ github.ref_name }}
          body_path: release_body.md
          fail_on_unmatched_files: true
          files: |
            app/build/outputs/apk/release/OnePlus15.apk
