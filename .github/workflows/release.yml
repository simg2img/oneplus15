name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.10.2"

      - name: Build APK
        run: gradle assembleRelease --stacktrace

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore release.jks -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=OnePlus15, OU=simg2img, O=simg2img, L=Unknown, ST=Unknown, C=ID"
          BT_DIR=$(ls -d $ANDROID_SDK_ROOT/build-tools/*/ 2>/dev/null | head -1)
          ${BT_DIR}zipalign -p -f -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/OnePlus15.apk
          ${BT_DIR}apksigner sign --ks release.jks --ks-pass pass:android123 \
            --ks-key-alias release --key-pass pass:android123 \
            app/build/outputs/apk/release/OnePlus15.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus15.apk
          path: app/build/outputs/apk/release/OnePlus15.apk
