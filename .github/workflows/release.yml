name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0)'
        required: false
        default: 'v1.0'
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.10.2"

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore release.jks -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=OnePlus15, OU=simg2img, O=simg2img, L=Unknown, ST=Unknown, C=ID"
          keytool -list -v -keystore release.jks -storepass android123 -alias release \
            | grep -i "SHA256:" | head -1 | awk '{print $NF}' > release.fingerprint

      - name: Build release APK
        run: gradle assembleRelease --stacktrace

      - name: Install build-tools
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" 2>&1 || true

      - name: Set up build-tools PATH
        run: |
          BT_DIR=$(ls -d $ANDROID_SDK_ROOT/build-tools/*/ 2>/dev/null | head -1 | sed 's/\/$//')
          echo "$BT_DIR" >> $GITHUB_PATH

      - name: Sign APK
        run: |
          apksigner sign --ks release.jks --ks-pass pass:android123 \
            --ks-key-alias release --key-pass pass:android123 \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Align APK
        run: |
          zipalign -p 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/OnePlus15.apk

      - name: Verify APK signature
        run: apksigner verify --verbose app/build/outputs/apk/release/OnePlus15.apk

      - name: Prepare release notes
        run: |
          echo "## OnePlus 15 LSPosed Module" > release_body.md
          echo "" >> release_body.md
          echo "### SHA-256 Fingerprint:" >> release_body.md
          echo '```' >> release_body.md
          cat release.fingerprint >> release_body.md
          echo '```' >> release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: OnePlus 15 ${{ github.ref_name }}
          body_path: release_body.md
          fail_on_unmatched_files: true
          files: |
            app/build/outputs/apk/release/OnePlus15.apk
